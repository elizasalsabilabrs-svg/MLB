<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - MindBloom Library</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --primary:#6BBF9A;
  --primary-dark:#4CAF84;
  --text-dark:#2f5d4a;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:linear-gradient(180deg,#4CAF84 0%,#A8E6CF 100%);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.card{
  background:white;
  padding:40px;
  width:90%;
  max-width:400px;
  border-radius:25px;
  box-shadow:0 20px 40px rgba(0,0,0,0.15);
  text-align:center;
}

.card h2{
  color:var(--primary-dark);
  margin-bottom:25px;
}

.input-group{
  margin-bottom:20px;
  text-align:left;
}

.input-group label{
  font-size:14px;
  color:var(--text-dark);
}

.input-group input{
  width:100%;
  padding:12px;
  margin-top:5px;
  border-radius:20px;
  border:2px solid var(--primary);
  outline:none;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:25px;
  background:var(--primary);
  color:white;
  font-weight:600;
  cursor:pointer;
  margin-top:10px;
}

button:hover{
  background:var(--primary-dark);
}

.card p{
  margin-top:15px;
  font-size:13px;
}

.card a{
  color:var(--primary-dark);
  text-decoration:none;
  font-weight:600;
}
</style>
</head>

<body>

<div class="card">
  <h2>🌿 Login</h2>

  <div class="input-group">
    <label>Email</label>
    <input type="email" placeholder="Masukkan email">
  </div>

  <div class="input-group">
    <label>Password</label>
    <input type="password" placeholder="Masukkan password">
  </div>

  <button>Masuk</button>

  <p>Belum punya akun? <a href="signup.html">Daftar di sini</a></p>
</div>

</body>
</html>
