<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Profil Mahasiswa</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      width: 420px;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
      text-align: center;
    }

    h1 {
      margin: 0;
      font-weight: 600;
      color: #2c3e50;
      font-size: 26px;
    }

    .subtitle {
      color: #777;
      font-size: 14px;
      margin-bottom: 30px;
    }

    .info {
      text-align: left;
      margin-top: 20px;
    }

    .info p {
      margin: 12px 0;
      font-size: 15px;
      color: #333;
    }

    .label {
      font-weight: 500;
      color: #5a67d8;
    }

    .footer {
      margin-top: 30px;
      font-size: 13px;
      color: #999;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Eliza Salsabila Br.s</h1>
    <div class="subtitle">Mahasiswa Universitas Sumatra Utara</div>

    <div class="info">
      <p><span class="label">NIM</span> : 230709014</p>
      <p><span class="label">Kelas</span> : B</p>
      <p><span class="label">Universitas</span> : Universitas Sumatra Utara</p>
      <p><span class="label">Mata Kuliah</span> : Pengembangan Web Perpustakaan</p>
    </div>

    <div class="footer">
      © 2026 | Web Profil Mahasiswa
    </div>
  </div>
</body>
</html>
